<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Netflix Warp Tunnel</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #000;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  overflow: hidden;
  font-family: 'Arial Black', Arial, sans-serif;
}
#app {
  position: relative;
  width: 393px;
  height: 852px;
  overflow: hidden;
  background: #000;
}
#canvas {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 1;
}
/* DOM card layer */
#cards-layer {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  overflow: hidden;
  z-index: 2;
}
.card-el {
  position: absolute;
  top: 0; left: 0;
  width: 260px;
  height: 169px;
  transform-origin: center center;
  pointer-events: auto;
  will-change: transform, opacity;
  overflow: hidden;
  border-radius: 2px;
  cursor: pointer;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
}

.card-el img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
  pointer-events: none;
  user-select: none;
  -webkit-user-drag: none;
}

.card-meta {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 5px 8px 7px;
  background: linear-gradient(to top, rgba(0,0,0,0.88) 0%, transparent 100%);
  pointer-events: none;
}
.card-title-text {
  color: #fff;
  font-size: 9px;
  font-weight: 900;
  letter-spacing: 1px;
  text-transform: uppercase;
  font-family: 'Arial Black', Arial, sans-serif;
  line-height: 1.2;
}
/* Slider */
/* ── Fader slider ── */
#slider-container {
  position: absolute;
  right: 16px;
  top: 50%;
  transform: translateY(-50%);
  width: 52px;
  height: 300px;
  z-index: 10;
  cursor: pointer;
  user-select: none;
  opacity: 0.88;
}
#slider-container .ticks {
  position: absolute;
  left: 50%;
  top: 0; bottom: 0;
  transform: translateX(-50%);
  width: 34px;
  pointer-events: none;
}
#slider-container .tick {
  position: absolute;
  left: 0; right: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  transform: translateY(-50%);
}
#slider-container .tick-line {
  height: 1px;
  width: 4px;
  background: rgba(255,255,255,0.1);
  border-radius: 1px;
}
#slider-container .tick-line.major { width: 7px; background: rgba(255,255,255,0.18); }
#slider-container .track {
  position: absolute;
  left: 50%;
  top: 0; bottom: 0;
  transform: translateX(-50%);
  width: 2px;
  background: rgba(255,255,255,0.1);
  border-radius: 2px;
}
#slider-fill {
  position: absolute;
  left: 0; right: 0; bottom: 0;
  border-radius: 2px;
  background: linear-gradient(to top, rgba(229,9,20,0.9), rgba(229,9,20,0.2));
  pointer-events: none;
  box-shadow: 0 0 6px rgba(229,9,20,0.4);
}
#slider-thumb {
  position: absolute;
  left: 50%;
  transform: translate(-50%, 50%);
  width: 52px;
  height: 28px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.18);
  border-top-color: rgba(255,255,255,0.3);
  border-radius: 8px;
  cursor: grab;
  box-shadow:
    0 2px 12px rgba(0,0,0,0.35),
    inset 0 1px 0 rgba(255,255,255,0.12);
  transition: border-color 0.18s, box-shadow 0.18s, background 0.18s;
  z-index: 10;
  bottom: 0;
}
#slider-thumb:active { cursor: grabbing; }
#slider-thumb.active {
  background: rgba(229,9,20,0.18);
  border-color: rgba(229,9,20,0.6);
  border-top-color: rgba(229,9,20,0.8);
  box-shadow:
    0 0 18px rgba(229,9,20,0.35),
    0 2px 12px rgba(0,0,0,0.4),
    inset 0 1px 0 rgba(255,255,255,0.1);
}
#slider-thumb .grip {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  width: 16px;
  height: 1.5px;
  background: rgba(255,255,255,0.25);
  border-radius: 1px;
}
#slider-thumb .grip:nth-child(1) { top:  7px; }
#slider-thumb .grip:nth-child(2) { top: 12px; width: 20px; background: rgba(229,9,20,0.7); }
#slider-thumb .grip:nth-child(3) { top: 17px; }
/* Vignette overlay */
#vignette {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 5;
  opacity: 0;
  background: radial-gradient(ellipse at center, transparent 40%, #E50914 100%);
  mix-blend-mode: screen;
}
/* Detail overlay */
/* Grain overlay */
#grain {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 8;
  opacity: 0.04;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
}
</style>
</head>
<body>
<div id="app">
  <canvas id="canvas"></canvas>
  <div id="cards-layer"></div>

  <div id="grain"></div>
  <div id="vignette"></div>

  <div id="slider-container">
    <div class="ticks" id="slider-ticks"></div>
    <div class="track">
      <div id="slider-fill"></div>
    </div>
    <div id="slider-thumb">
      <div class="grip"></div>
      <div class="grip"></div>
      <div class="grip"></div>
    </div>
  </div>


</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script>
// ─── DATA ────────────────────────────────────────────────────────────────────
const GENRE_COLORS = {
  horror:   '#c0392b',
  romance:  '#e91e63',
  scifi:    '#4a90d9',
  mystery:  '#9b59b6',
  crime:    '#27ae60',
  action:   '#e67e22',
  thriller: '#9b59b6',
  drama:    '#4a90d9',
};

let SHOWS = [];

// ─── STATE ───────────────────────────────────────────────────────────────────
let sliderValue = 0;
let targetSlider = 0;
let speed = 0;
let isDragging = false;
let dragStartY = 0;
let dragStartVal = 0;
let decayTimer = null;
let appWidth = 393, appHeight = 852;

// ─── THREE.JS — STARS ONLY ───────────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: false, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 3));
renderer.setSize(appWidth, appHeight);
renderer.setClearColor(0x000000, 1);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x000000, 0.016);

const camera = new THREE.PerspectiveCamera(70, appWidth / appHeight, 0.1, 300);
camera.position.set(0, 0, 0);

// Stars — dots (slow) + radial streaks (fast)
const STAR_COUNT = 300;
const starBasePos = new Float32Array(STAR_COUNT * 3);
for (let i = 0; i < STAR_COUNT; i++) {
  starBasePos[i * 3]     = (Math.random() - 0.5) * 80;
  starBasePos[i * 3 + 1] = (Math.random() - 0.5) * 80;
  starBasePos[i * 3 + 2] = -(Math.random() * 160);
}

// Circular star sprite (soft gaussian disc, not a square)
const _starCanvas = document.createElement('canvas');
_starCanvas.width = _starCanvas.height = 32;
const _starCtx = _starCanvas.getContext('2d');
const _starGrad = _starCtx.createRadialGradient(16, 16, 0, 16, 16, 15);
_starGrad.addColorStop(0,   'rgba(255,255,255,1)');
_starGrad.addColorStop(0.35,'rgba(255,255,255,0.85)');
_starGrad.addColorStop(1,   'rgba(255,255,255,0)');
_starCtx.fillStyle = _starGrad;
_starCtx.fillRect(0, 0, 32, 32);
const starSpriteTex = new THREE.CanvasTexture(_starCanvas);

const starGeo = new THREE.BufferGeometry();
starGeo.setAttribute('position', new THREE.BufferAttribute(starBasePos.slice(), 3));
const starMat = new THREE.PointsMaterial({
  color: 0xffffff, size: 0.6, sizeAttenuation: true,
  transparent: true, opacity: 1,
  map: starSpriteTex, alphaTest: 0.01,
});
const stars = new THREE.Points(starGeo, starMat);
scene.add(stars);

// Streak lines — 2 vertices per star (base + radial tip)
const streakPos = new Float32Array(STAR_COUNT * 6);
const streakGeo = new THREE.BufferGeometry();
streakGeo.setAttribute('position', new THREE.BufferAttribute(streakPos, 3));
const streakMat = new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0 });
const starStreaks = new THREE.LineSegments(streakGeo, streakMat);
scene.add(starStreaks);

// ─── DOM CARD SYSTEM ─────────────────────────────────────────────────────────
const CARD_COUNT  = 90;
const TUNNEL_RADIUS = 5.5;
const CARD_W = 2.0, CARD_H = 1.3;
const TUNNEL_LENGTH = 80;

// Projection constants (matches Three.js PerspectiveCamera FOV=70°)
const FOV_RAD   = 70 * Math.PI / 180;
const FOCAL_PIX = (appHeight / 2) / Math.tan(FOV_RAD / 2); // ≈ 608 px/unit at depth=1

const CARD_BASE_W = 260; // DOM element natural width (px)
const CARD_BASE_H = Math.round(CARD_BASE_W * CARD_H / CARD_W); // 169 px

// Color palette sampled from the reference streak images
const STREAK_PALETTE = [
  // Reds & crimson
  '#C42020', '#E03030', '#D43828',
  // Orange-reds
  '#D44018', '#E06020', '#C85020',
  // Oranges & amber
  '#E08020', '#D09030', '#C8A038',
  // Gold/yellow
  '#B89830', '#C8A840',
  // Pinks & hot pink
  '#E03070', '#D03880', '#C82878',
  // Mauve & rose
  '#D06080', '#C87890', '#B86878',
  // Browns & copper
  '#A05830', '#885030', '#6A3820',
  // Deep blues
  '#1838B8', '#1850C8', '#2060D0',
  // Bright blues
  '#2878E0', '#4090E8', '#1880D0',
  // Teal & blue-green
  '#1898A8', '#10A0A8', '#20A8B0',
  // Greens
  '#38A848', '#60B030', '#80B840',
];

function pickStreakColor() {
  return STREAK_PALETTE[Math.floor(Math.random() * STREAK_PALETTE.length)];
}

function createCardElement(show) {
  const el = document.createElement('div');
  el.className = 'card-el';

  const img = document.createElement('img');
  img.src = show.img;
  img.crossOrigin = 'anonymous';
  img.loading = 'eager';
  img.onerror = () => { img.style.display = 'none'; };
  el.appendChild(img);

  const meta = document.createElement('div');
  meta.className = 'card-meta';
  meta.style.opacity = '0';
  meta.innerHTML = `<div class="card-title-text">${show.title}</div>`;
  el.appendChild(meta);

  return el;
}

const cardsLayer = document.getElementById('cards-layer');
const cards = [];

fetch('contents.json')
  .then(r => r.json())
  .then(data => {
    SHOWS = data;
    initCards();
    animate();
  });

function placeCard(card, i, isRecycle = false) {
  const angle = i * 2.39996; // golden angle
  const r = TUNNEL_RADIUS + Math.sin(i * 2.3) * 1.5;
  card.x = Math.cos(angle) * r;
  card.y = Math.sin(angle) * r * 1.5; // was 0.6 — fills full screen height in portrait
  card.z = isRecycle
    ? -(TUNNEL_LENGTH + 2 + Math.random() * 10)
    : -(2 + (i / CARD_COUNT) * TUNNEL_LENGTH);
  card.rotZ = 0; // no tilt — keep thumbnails as clean rectangles
}

function initCards() {
  for (let i = 0; i < CARD_COUNT; i++) {
    const show = SHOWS[i % SHOWS.length];
    const el = createCardElement(show);
    cardsLayer.appendChild(el);

    const card = {
      show,
      el,
      img: el.querySelector('img'),
      meta: el.querySelector('.card-meta'),
      accentColor: '#888888', // replaced immediately below
      x: 0, y: 0, z: 0,
      rotZ: 0,
      scaleVal: 1,
      isHovered: false,
    };

    // Assign a random color from the reference streak palette
    const color = pickStreakColor();
    card.accentColor = color;
    card.el.style.background =
      `linear-gradient(to right, transparent 0%, ${color}bb 18%, ${color} 42%, ${color} 58%, ${color}bb 82%, transparent 100%)`;

    el.addEventListener('pointerenter', () => { card.isHovered = true; });
    el.addEventListener('pointerleave', () => { card.isHovered = false; });

    cards.push(card);
  }

  cards.forEach((card, i) => placeCard(card, i, false));
}

// ─── SLIDER ──────────────────────────────────────────────────────────────────
const vignette        = document.getElementById('vignette');
const sliderContainer = document.getElementById('slider-container');
const sliderFill      = document.getElementById('slider-fill');
const sliderThumb     = document.getElementById('slider-thumb');
const TRACK_H = 300;

// Build ticks
(function buildTicks() {
  const ticks = document.getElementById('slider-ticks');
  for (let t = 0; t <= 20; t++) {
    const tick = document.createElement('div');
    tick.className = 'tick';
    tick.style.top = (t / 20 * 100) + '%';
    const major = t % 4 === 0;
    tick.innerHTML =
      `<div class="tick-line ${major ? 'major' : ''}"></div>` +
      `<div class="tick-line ${major ? 'major' : ''}"></div>`;
    ticks.appendChild(tick);
  }
})();

function setSliderVisual(v) {
  const bottomPx = v * TRACK_H;
  sliderFill.style.height  = bottomPx + 'px';
  sliderThumb.style.bottom = bottomPx + 'px';
}

function getTrackY(e) {
  return e.clientY !== undefined ? e.clientY : e.touches[0].clientY;
}

function onDragStart(e) {
  isDragging = true;
  dragStartY   = getTrackY(e);
  dragStartVal = sliderValue;
  sliderThumb.classList.add('active');
  clearTimeout(decayTimer);
  e.preventDefault();
}

function onDragMove(e) {
  if (!isDragging) return;
  const dy = dragStartY - getTrackY(e);
  sliderValue = Math.max(0, Math.min(1, dragStartVal + dy / TRACK_H));
  targetSlider = sliderValue;
  setSliderVisual(sliderValue);
  e.preventDefault();
}

function onDragEnd() {
  if (!isDragging) return;
  isDragging = false;
  sliderThumb.classList.remove('active');
  startDecay();
}

function startDecay() {
  clearTimeout(decayTimer);
  const step = () => {
    if (isDragging) return;
    targetSlider = Math.max(0, targetSlider - 0.008);
    if (targetSlider <= 0) { targetSlider = 0; return; }
    decayTimer = setTimeout(step, 30);
  };
  decayTimer = setTimeout(step, 100);
}

// Rail click to jump
sliderContainer.addEventListener('click', e => {
  if (sliderThumb.contains(e.target)) return;
  const rect = sliderContainer.getBoundingClientRect();
  const fromBottom = rect.bottom - e.clientY;
  sliderValue = Math.max(0, Math.min(1, fromBottom / TRACK_H));
  targetSlider = sliderValue;
  setSliderVisual(sliderValue);
  startDecay();
});

sliderThumb.addEventListener('mousedown',  onDragStart);
sliderThumb.addEventListener('touchstart', onDragStart, { passive: false });
document.addEventListener('mousemove',  onDragMove);
document.addEventListener('touchmove',  onDragMove, { passive: false });
document.addEventListener('mouseup',   onDragEnd);
document.addEventListener('touchend',  onDragEnd);



// ─── GLITCH LABEL ─────────────────────────────────────────────────────────────
const glitchLabel = document.createElement('div');
glitchLabel.style.cssText = `
  position:absolute; pointer-events:none; z-index:9;
  color:#fff; font-size:13px; font-weight:900; letter-spacing:2px;
  text-shadow: 1px 0 #E50914, -1px 0 #4a90d9;
  display:none; white-space:nowrap; text-transform:uppercase;
  font-family: 'Arial Black', Arial, sans-serif;
`;
document.getElementById('app').appendChild(glitchLabel);

// ─── ANIMATION LOOP ──────────────────────────────────────────────────────────
let clock = new THREE.Clock();
let frameN = 0;

const grain = document.getElementById('grain');
function animateGrain() {
  grain.style.transform = `translate(${(Math.random()-0.5)*4}px,${(Math.random()-0.5)*4}px)`;
}

function animate() {
  requestAnimationFrame(animate);
  frameN++;

  const dt = clock.getDelta();
  const t  = clock.getElapsedTime();

  // Smooth slider
  sliderValue += (targetSlider - sliderValue) * 0.12;
  setSliderVisual(sliderValue);


  // Speed: HYPER multiplier ramps 1→2× across the 0.80→1.0 range
  const hyperMult = sliderValue > 0.80 ? 1 + (sliderValue - 0.80) * 5 : 1;
  const baseSpeed = 7.0 + sliderValue * 34;
  speed = baseSpeed * hyperMult * dt;

  // Vignette
  vignette.style.opacity = Math.max(0, (sliderValue - 0.55) / 0.45) * 0.55;

  // ── Stars ──────────────────────────────────────────────────────────────────
  const streakFade = Math.min(1, Math.max(0, (sliderValue - 0.3) / 0.3));
  starMat.size    = 0.2 + Math.max(0, sliderValue - 0.5) * 0.5;
  starMat.opacity = Math.max(0.15, 1 - streakFade);
  streakMat.opacity = streakFade * 0.85;

  // Only update streak geometry when visible — skips CPU array write + GPU buffer upload
  if (streakMat.opacity > 0.02) {
    // Vertical elongation — streak extends in Y axis (세로로 길게)
    const streakLen = sliderValue * 10 * hyperMult;
    for (let si = 0; si < STAR_COUNT; si++) {
      const sx = starBasePos[si * 3], sy = starBasePos[si * 3 + 1], sz = starBasePos[si * 3 + 2];
      streakPos[si * 6]     = sx; streakPos[si * 6 + 1] = sy - streakLen * 0.5; streakPos[si * 6 + 2] = sz;
      streakPos[si * 6 + 3] = sx; streakPos[si * 6 + 4] = sy + streakLen * 0.5; streakPos[si * 6 + 5] = sz;
    }
    streakGeo.attributes.position.needsUpdate = true;
  }

  stars.rotation.z      = t * 0.003;
  starStreaks.rotation.z = t * 0.003;

  // ── DOM Cards ──────────────────────────────────────────────────────────────
  cardsLayer.style.pointerEvents = sliderValue > 0.6 ? 'none' : '';

  const chromaAmt = sliderValue > 0.80 ? (sliderValue - 0.80) * 12 : 0;
  const blurBase  = Math.max(0, sliderValue - 0.25) * 4.0;

  // Layer-level filter: one GPU pass for the entire card layer
  // chroma moved here too — saves 60 per-card img.style.filter writes at HYPER
  const layerChroma = chromaAmt > 0
    ? `drop-shadow(${chromaAmt.toFixed(1)}px 0 0 rgba(229,9,20,0.85)) drop-shadow(-${chromaAmt.toFixed(1)}px 0 0 rgba(74,144,217,0.85))`
    : '';
  const layerBlurStr = chromaAmt === 0 && blurBase > 0.2
    ? `blur(${(blurBase * 0.35).toFixed(2)}px)` : '';
  const newLayerFilter = layerChroma || layerBlurStr;
  if (cardsLayer.style.filter !== newLayerFilter) cardsLayer.style.filter = newLayerFilter;

  let nearCard = null;
  let nearDist = Infinity;
  let hoveredCard = null;

  cards.forEach((card, i) => {
    // Move toward camera (+Z)
    card.z += speed;
    if (card.z > 3) placeCard(card, i, true);

    const depth = -card.z;

    if (depth <= 0.3 || depth > TUNNEL_LENGTH + 15) {
      card.el.style.display = 'none';
      return;
    }

    // 3D → 2D projection
    const pixelScale = FOCAL_PIX / depth;
    const screenX = appWidth  / 2 + card.x * pixelScale;
    const screenY = appHeight / 2 - card.y * pixelScale;
    const cssScale = CARD_W * pixelScale / CARD_BASE_W;

    // Frustum cull
    const visW = CARD_BASE_W * cssScale;
    const visH = CARD_BASE_H * cssScale;
    if (screenX < -visW || screenX > appWidth + visW ||
        screenY < -visH || screenY > appHeight + visH) {
      card.el.style.display = 'none';
      return;
    }

    card.el.style.display = 'block';

    // Vertical stretch — same max as original (2×appHeight/visH at HYPER),
    // but all three kink thresholds (0.20/0.55/0.62) replaced with smooth curves
    const depthFactor = Math.max(0, 1 - depth / 12);
    // baseStretch: sv² (no kink at 0.20) — same depthFactor amplification
    const baseStretch = sliderValue * sliderValue * 1.5;
    const formulaStretchY = 1 + baseStretch * (1 + depthFactor * 4) * 1.8;
    // hyperT: smoothstep 0.40→1.0 (was linear 0.62→1.0)
    const hyperTraw = Math.max(0, Math.min(1, (sliderValue - 0.40) / 0.60));
    const hyperT    = hyperTraw * hyperTraw * (3 - 2 * hyperTraw);
    const targetStretch = 2 * appHeight / visH; // same max as original
    const stretchY = formulaStretchY + (targetStretch - formulaStretchY) * hyperT;

    // Nearest card tracking — skip at high speed (pointer events disabled anyway)
    const isNear = sliderValue < 0.70 && depth < 22 && depth > 0.5;
    if (isNear) {
      const dist3d = Math.sqrt(card.x * card.x + card.y * card.y + card.z * card.z);
      if (dist3d < nearDist) { nearDist = dist3d; nearCard = card; }
    }
    if (card.isHovered) hoveredCard = card;

    // Hover scale — skip at high speed (glow removed: caused colored border artifact)
    if (sliderValue <= 0.60) {
      const targetScale = card.isHovered ? 1.3 : 1.0;
      card.scaleVal += (targetScale - card.scaleVal) * 0.12;
    } else {
      card.scaleVal = 1;
    }

    const finalScale = cssScale * card.scaleVal;
    const farFade  = Math.min(1, Math.max(0, (TUNNEL_LENGTH - depth) / 20));
    // Quadratic ease-in: fades from depth 18 → 0.5. Slow start, accelerates near camera → no hard clip
    const nearRaw  = Math.min(1, Math.max(0, (depth - 0.5) / 17.5));
    const nearFade = nearRaw * nearRaw;
    const alpha = farFade * nearFade;

    // Transform — always write (card moves every frame); no rotation
    card.el.style.transform =
      `translate(${screenX.toFixed(1)}px,${screenY.toFixed(1)}px) translate(-50%,-50%) ` +
      `scale(${finalScale.toFixed(4)},${(finalScale * stretchY).toFixed(4)})`;

    // Opacity — write only when meaningfully changed
    const newAlpha = +alpha.toFixed(3);
    if (card._alpha !== newAlpha) { card.el.style.opacity = newAlpha; card._alpha = newAlpha; }

    // zIndex — throttle every 3 frames
    if (frameN % 3 === 0) {
      card.el.style.zIndex = Math.floor(10000 - depth * 10);
    }


    // img filter — clear per-card filter (chroma/blur now handled at cardsLayer level)
    if (card._imgFilter) { card.img.style.filter = ''; card._imgFilter = ''; }

    // Poster → color-bar crossfade: img fades out as speed ramps up
    const newImgOp = +(Math.max(0, 1 - (sliderValue - 0.35) / 0.45)).toFixed(3);
    if (card._imgOp !== newImgOp) { card.img.style.opacity = newImgOp; card._imgOp = newImgOp; }

    // Text: show when slow + close; depth 44 = 2× previous range (was 22)
    const newMetaOp = (sliderValue < 0.4 && depth < 44) ? +Math.min(1, (44 - depth) / 16).toFixed(3) : 0;
    if (card._metaOp !== newMetaOp) { card.meta.style.opacity = newMetaOp; card._metaOp = newMetaOp; }
  });

  // Glitch label: hover/touch only, SLOW mode only (sliderValue < 0.25)
  const glitchTarget = (hoveredCard && sliderValue < 0.25) ? hoveredCard : null;
  if (glitchTarget) {
    const depth = -glitchTarget.z;
    const px = FOCAL_PIX / depth;
    const lx = appWidth  / 2 + glitchTarget.x * px;
    const ly = appHeight / 2 - glitchTarget.y * px;
    const glitchFontSize = Math.max(6, Math.min(20, FOCAL_PIX / depth * 0.25));
    glitchLabel.style.display = 'block';
    glitchLabel.style.fontSize = glitchFontSize.toFixed(1) + 'px';
    const cardW = CARD_W * px;
    glitchLabel.style.left = (lx - cardW / 2).toFixed(1) + 'px';
    glitchLabel.style.top  = (ly + CARD_H * px / 2 + 6).toFixed(1) + 'px';
    const show  = glitchTarget.show;
    const chars = '!@#$%^&*ABCDEF';
    const gt    = t * 10;
    let gl = '';
    for (let c = 0; c < show.title.length; c++) {
      gl += (Math.sin(gt + c * 1.3) > 0.7)
        ? chars[Math.floor(Math.random() * chars.length)]
        : show.title[c];
    }
    glitchLabel.textContent = gl;
    glitchLabel.style.textShadow = `${Math.sin(t*20)*3}px 0 #E50914, ${-Math.sin(t*20)*3}px 0 #4a90d9`;
  } else {
    glitchLabel.style.display = 'none';
  }

  if (frameN % 4 === 0) animateGrain();

  renderer.render(scene, camera);
}
</script>
</body>
</html>
