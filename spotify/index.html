<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <base href="/spotify/">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Lyrics Rain — Spotify</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/matter-js@0.19.0/build/matter.min.js"></script>
</head>
<body>
  <div class="player">

    <!-- Status Bar -->
    <div class="status-bar">
      <span class="time" id="status-time">9:41</span>
      <div class="status-icons">
        <svg width="17" height="12" viewBox="0 0 17 12" fill="white"><rect x="0" y="3" width="3" height="9" rx="1"/><rect x="4.5" y="2" width="3" height="10" rx="1"/><rect x="9" y="0" width="3" height="12" rx="1"/><rect x="13.5" y="0" width="3" height="12" rx="1" opacity="0.3"/></svg>
        <svg width="16" height="12" viewBox="0 0 16 12" fill="white"><path d="M8 2.4C10.8 2.4 13.3 3.6 15 5.5L16 4.4C14 2.2 11.2 1 8 1C4.8 1 2 2.2 0 4.4L1 5.5C2.7 3.6 5.2 2.4 8 2.4Z"/><path d="M8 5.2C9.9 5.2 11.6 6 12.8 7.3L13.8 6.2C12.3 4.6 10.3 3.7 8 3.7C5.7 3.7 3.7 4.6 2.2 6.2L3.2 7.3C4.4 6 6.1 5.2 8 5.2Z"/><circle cx="8" cy="10" r="2"/></svg>
        <svg width="25" height="12" viewBox="0 0 25 12" fill="white"><rect x="0" y="1" width="22" height="10" rx="3" stroke="white" stroke-width="1" fill="none"/><rect x="1.5" y="2.5" width="17" height="7" rx="2" fill="white"/><rect x="22.5" y="4" width="2" height="4" rx="1" fill="white" opacity="0.4"/></svg>
      </div>
    </div>

    <!-- Player Header -->
    <div class="player-header">
      <button class="icon-btn" onclick="history.back()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <div class="header-center">
        <span class="playing-from">재생 중</span>
        <span class="playlist-name" id="playlist-name">나의 플레이리스트</span>
      </div>
      <button class="icon-btn">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="5" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="12" cy="19" r="2"/></svg>
      </button>
    </div>

    <!-- Physics Canvas (Lyrics Rain Area) -->
    <div class="canvas-wrap" id="canvas-wrap">
      <canvas id="physics-canvas"></canvas>
      <div class="canvas-hint" id="canvas-hint">▶ 재생 버튼을 눌러 시작하세요</div>
    </div>

    <!-- Song Info -->
    <div class="song-info">
      <div class="song-details">
        <div class="song-title" id="song-title">노래 제목</div>
        <div class="artist-name" id="artist-name">아티스트</div>
      </div>
      <button class="like-btn" id="like-btn" onclick="toggleLike()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
      </button>
    </div>

    <!-- Progress -->
    <div class="progress-section">
      <div class="progress-bar-wrap" id="progress-wrap">
        <div class="progress-track">
          <div class="progress-fill" id="progress-fill"></div>
          <div class="progress-thumb" id="progress-thumb"></div>
        </div>
      </div>
      <div class="time-row">
        <span id="current-time">0:00</span>
        <span id="total-time">0:00</span>
      </div>
    </div>

    <!-- Controls -->
    <div class="controls">
      <button class="ctrl-btn shuffle-btn" id="shuffle-btn" onclick="toggleShuffle()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/></svg>
      </button>
      <button class="ctrl-btn" onclick="skipBack()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
      <button class="ctrl-btn play-pause" id="play-btn" onclick="togglePlay()">
        <svg id="play-icon" width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        <svg id="pause-icon" width="28" height="28" viewBox="0 0 24 24" fill="currentColor" style="display:none"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg>
      </button>
      <button class="ctrl-btn" onclick="skipForward()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
      <button class="ctrl-btn repeat-btn" id="repeat-btn" onclick="toggleRepeat()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
      </button>
    </div>

    <!-- Volume -->
    <div class="volume-row">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" class="vol-icon"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/></svg>
      <input type="range" class="volume-slider" id="volume-slider" min="0" max="100" value="70">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" class="vol-icon"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/></svg>
    </div>

    <!-- File upload -->
    <div class="file-row">
      <label class="file-label" id="file-label">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
        음악 파일 추가
        <input type="file" accept="audio/*" id="audio-file" style="display:none">
      </label>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
